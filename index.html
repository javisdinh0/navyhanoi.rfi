<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMC - NAVY Hanoi RFI | Q&A Portal</title>
  <meta name="description" content="Q&A Portal for AMC - NAVY Hanoi RFI documents.">
  <link rel="stylesheet" href="style.css">
  <!-- SheetJS CDN for parsing Excel files -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

  <!-- Authentication Section -->
  <section id="auth-section">
    <div class="auth-card">
      <h1>RFI Portal</h1>
      <p>Please sign in to access the Q&A documents</p>
      
      <form id="login-form">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="name@example.com" required autocomplete="email">
        </div>
        <button type="submit" class="btn">Sign In</button>
      </form>
    </div>
  </section>

  <!-- Application Section -->
  <section id="app-section">
    <header>
      <div class="brand">AMC - NAVY Hanoi</div>
      <div class="user-info">
        <span class="user-email" id="user-email-display">user@example.com</span>
        <button id="logout-btn" class="btn-logout">Sign Out</button>
      </div>
    </header>

    <main class="table-container">
      <div class="qa-header">
        <h2>RFI Questions & Answers Table</h2>
        <p>Double-click on cells to edit. Click "Add Row" to append a new question, or import an Excel file.</p>
        <div style="display: flex; gap: 10px;">
          <button id="add-row-btn" class="btn btn-small">Add Row</button>
          <button id="import-excel-btn" class="btn btn-small" style="background: linear-gradient(to right, #10b981, #059669);">Import from Excel</button>
          <input type="file" id="excel-file-input" accept=".xlsx, .xls, .csv" style="display: none;">
        </div>
      </div>

      <div class="excel-table-wrapper">
        <table id="qa-table">
          <thead>
            <tr>
              <th width="5%">ID</th>
              <th width="35%">Question</th>
              <th width="40%">Answer</th>
              <th width="15%">Images</th>
              <th width="5%">Actions</th>
            </tr>
          </thead>
          <tbody id="qa-table-body">
            <!-- Table rows injected by app.js -->
          </tbody>
        </table>
      </div>
    </main>
  </section>

  <script src="app.js"></script>
</body>
</html>
