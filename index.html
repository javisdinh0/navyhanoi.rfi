<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMC - NAVY Hanoi RFI | Q&A Portal</title>
  <meta name="description" content="Q&A Portal for AMC - NAVY Hanoi RFI documents.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Authentication Section -->
  <section id="auth-section">
    <div class="auth-card">
      <h1>RFI Portal</h1>
      <p>Please sign in to access the Q&A documents</p>
      
      <form id="login-form">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="name@example.com" required autocomplete="email">
        </div>
        <button type="submit" class="btn">Sign In</button>
      </form>
    </div>
  </section>

  <!-- Application Section -->
  <section id="app-section">
    <header>
      <div class="brand">AMC - NAVY Hanoi</div>
      <div class="user-info">
        <span class="user-email" id="user-email-display">user@example.com</span>
        <button id="logout-btn" class="btn-logout">Sign Out</button>
      </div>
    </header>

    <main>
      <div class="qa-header">
        <h2>RFI Questions & Answers</h2>
        <p>Review the details and documents below. Click on thumbnails to view full-size images.</p>
      </div>

      <div class="qa-list" id="qa-container">
        <!-- Q&A Items will be dynamically injected here by app.js -->
      </div>
    </main>
  </section>

  <script src="app.js"></script>
</body>
</html>
